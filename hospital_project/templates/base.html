<!DOCTYPE html>
<html>

<head>
    <title>Hospital Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .appointment-card {
            transition: all 0.2s ease;
        }

        .appointment-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        body {
            margin: 0;
            background-color: #f5f7fa;
        }

        .doctor-card {
            border-radius: 18px;
            padding: 20px;
            background: white;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: 0.3s;
        }

        .doctor-card:hover {
            transform: translateY(-5px);
        }

        .avatar {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            background: #e9f2f1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 20px;
            color: #1aa179;
        }

        .available-dot {
            width: 10px;
            height: 10px;
            background: #28c76f;
            border-radius: 50%;
            position: absolute;
            right: 20px;
            top: 20px;
        }

        .badge-available {
            background-color: #e6f9f0;
            color: #28c76f;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 14px;
        }

        .badge-unavailable {
            background-color: #ececec;
            color: #666;
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 14px;
        }

        .sidebar {
            width: 240px;
            height: 100vh;
            background: white;
            position: fixed;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.05);
        }

        .sidebar a {
            display: block;
            padding: 10px;
            border-radius: 10px;
            text-decoration: none;
            color: #333;
            margin-bottom: 10px;
        }

        .sidebar a:hover {
            background-color: #e9f2f1;
            color: #1aa179;
        }

        .main-content {
            margin-left: 260px;
            padding: 30px;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h4>Hospital</h4>

        <a href="/">Dashboard</a>
        <a href="/doctors/">Doctors</a>
        <a href="/patients/">Patients</a>
        <a href="/beds/">Bed Management</a>
        <a href="/appointments/">Appointments</a>
        <a href="/pharmacy/">Pharmacy</a>
        <a href="/labs/">Labs</a>
        <a href="/billing/">Billing</a>

    </div>

    <!-- Main Content -->
    <div class="main-content">

        <!-- YOUR ORIGINAL CONTENT KEPT -->
        <h1>Hospital Management System</h1>

        {% block content %}
        {% endblock %}

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
