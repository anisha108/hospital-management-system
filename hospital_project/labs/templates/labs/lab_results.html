{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-3">
    <h4>Lab Tests</h4>

    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addModal">
        + Add Lab Test
    </button>
</div>

<div class="row">

<!-- LEFT SIDE (LAB LIST) -->
<div class="col-md-5">
    <div class="card shadow-sm">

        {% for r in results %}
        <div class="p-3 border-bottom d-flex justify-content-between align-items-center">

            <div>
                <b>{{ r.patient.name }}</b><br>
                <small class="text-muted">{{ r.test.name }}</small>
            </div>

            <button class="view-btn"
    data-patient="{{ r.patient.name }}"
    data-test="{{ r.test.name }}"
    data-result="{{ r.result }}"
    data-range="{{ r.test.normal_range }}"
    data-status="{{ r.status }}">
    View
</button>

        </div>
        {% empty %}
        <div class="p-3 text-center text-muted">
            No lab tests yet
        </div>
        {% endfor %}

    </div>
</div>

<!-- RIGHT SIDE (DETAIL PANEL) -->
<div class="col-md-7">
    <div class="card shadow-sm p-4">

        <h5>Lab Details</h5>
        <hr>

        <p><b>Patient:</b> <span id="d_patient">Select a test</span></p>
        <p><b>Test:</b> <span id="d_test">-</span></p>
        <p><b>Status:</b> <span id="d_status">-</span></p>
        <p><b>Result:</b> <span id="d_result">-</span></p>
        <p><b>Normal Range:</b> <span id="d_range">-</span></p>

    </div>
</div>

</div>
</div>

<!-- ADD LAB TEST MODAL -->
<div class="modal fade" id="addModal" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content p-3">

    <h5 class="mb-3">Add Lab Test</h5>

    <form method="POST">
        {% csrf_token %}

        <label>Patient</label>
        <select name="patient" class="form-control mb-2">
            {% for p in patients %}
            <option value="{{ p.id }}">{{ p.name }}</option>
            {% endfor %}
        </select>

        <label>Test</label>
        <select name="test" class="form-control mb-2">
            {% for t in tests %}
            <option value="{{ t.id }}">{{ t.name }}</option>
            {% endfor %}
        </select>

        <label>Status</label>
        <select name="status" class="form-control mb-2">
            <option value="In Progress">In Progress</option>
            <option value="Completed">Completed</option>
            <option value="Critical">Critical</option>
        </select>

        <label>Result</label>
        <input type="text" name="result" class="form-control mb-3" placeholder="Enter result">

        <button class="btn btn-success w-100">Save</button>
    </form>

</div>
</div>
</div>

<!-- JS -->
<script>
    document.querySelectorAll('.view-btn').forEach(btn => {
        btn.addEventListener('click', function () {
            document.getElementById('d_patient').innerText = this.dataset.patient;
            document.getElementById('d_test').innerText = this.dataset.test;
            document.getElementById('d_result').innerText = this.dataset.result;
            document.getElementById('d_range').innerText = this.dataset.range;
            document.getElementById('d_status').innerText = this.dataset.status;
        });
    });
    </script>

{% endblock %}
